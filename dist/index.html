<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Exama - Đang phát triển</title>

  <!-- Tailwind CDN -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=Noto+Serif:wght@700&display=swap" rel="stylesheet">

  <style>
    body {
      font-family: 'DM Sans', sans-serif;
      background-color: #faf9f6;
    }
    .font-serif {
      font-family: 'Noto Serif', serif;
    }
  </style>
</head>
<body class="min-h-screen flex items-center justify-center px-4">

  <div class="max-w-xl w-full bg-white border border-[#e8e4d9] rounded-md shadow-sm p-8 text-center">

    <!-- Title -->
    <h1 class="font-serif text-3xl text-[#27251f] mb-4">
      Exama
    </h1>

    <!-- Subtitle -->
    <p class="text-[#5e5a52] mb-6">
      Nền tảng thi trực tuyến đang trong quá trình phát triển.
    </p>

    <!-- Badge -->
    <div class="inline-block px-3 py-1 text-xs font-semibold uppercase tracking-wide 
                text-[#d9a93a] bg-[#fff6e0] border border-[#f0d9a5] rounded mb-6">
      Coming Soon
    </div>

    <!-- Description -->
    <p class="text-sm text-[#8c8679] mb-8 leading-relaxed">
      Dự án đang được xây dựng với mục tiêu tạo ra một hệ thống thi online 
      rõ ràng, ổn định và tập trung vào trải nghiệm học tập.
    </p>

    <!-- Button -->
    <a href="https://github.com/kyle2910/exama"
       target="_blank"
       class="inline-block px-5 py-2.5 text-sm text-white 
              bg-[#2d6899] hover:bg-[#1f5280] 
              rounded-md transition font-medium">
      Xem trên GitHub
    </a>

    <!-- Footer -->
    <p class="text-xs text-[#b8b3a8] mt-8">
      © 2026 Exama Project
    </p>

  </div>

</body>
</html>
